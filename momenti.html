<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши моменты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('images/fon.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 240, 245, 0.3);
            pointer-events: none;
            z-index: 0;
        }

        .page-title {
            font-size: 4rem;
            font-weight: 400;
            color: #ad6d7e;
            text-shadow: 3px 3px 0 #fbc1cb, 6px 6px 0 rgba(255, 220, 230, 0.7);
            border-bottom: 5px dotted #ffb6c1;
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            font-family: 'Brush Script MT', cursive;
            transform: rotate(-0.8deg);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .sub {
            color: #b9878a;
            font-style: italic;
            font-size: 1.5rem;
            background: rgba(255, 240, 243, 0.9);
            padding: 0.6rem 3rem;
            border-radius: 50px;
            box-shadow: 0 5px 20px #ffd9e2;
            margin-bottom: 3rem;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        .main-cards {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4rem 3rem;
            margin: 2rem auto;
            position: relative;
            z-index: 1;
        }

        .fan-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 500px;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fan-card.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .fan-container {
            position: relative;
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .main-photo {
            position: relative;
            z-index: 10;
            background-color: white;
            padding: 20px 20px 30px 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid #ece3d5;
            transform: rotate(var(--main-rot, 0deg));
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: fit-content;
            line-height: 0;
            cursor: pointer;
        }

        .main-photo:hover {
            transform: rotate(var(--main-rot, 0deg)) scale(1.02);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25);
        }

        .main-photo:hover ~ .fan-photo,
        .fan-container:hover .fan-photo {
            filter: brightness(1.1) drop-shadow(0 0 5px rgba(255, 182, 193, 0.5));
        }

        .main-photo img, .main-photo video {
            display: block;
            width: 320px;
            height: 240px;
            object-fit: cover;
            border: 1px solid #d9c9b5;
            pointer-events: none;
        }
        
        .main-photo video {
            pointer-events: auto;
            background: #f0e4d6;
        }

        .fan-photo {
            position: absolute;
            background-color: white;
            padding: 5px 5px 10px 5px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid #d9c9b5;
            width: fit-content;
            line-height: 0;
            transition: all 0.3s ease;
            z-index: 5;
            cursor: pointer;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .fan-photo:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 20;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
        }

        .fan-photo img, .fan-photo .video-preview {
            display: block;
            width: 100px;
            height: 75px;
            object-fit: cover;
            border: 1px solid #c0aa8e;
        }
        
        .fan-photo .video-preview {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .main-label {
            background-color: #ffe4ec;
            border: 6px double #ff99bb;
            border-radius: 30px 10px 30px 10px;
            padding: 16px 28px;
            font-size: 1.5rem;
            color: #8f4b5c;
            text-align: center;
            font-family: 'Segoe Script', cursive;
            box-shadow: 0 10px 15px rgba(255, 150, 180, 0.3);
            transform: rotate(var(--label-rot, 1deg));
            max-width: 400px;
            margin-top: 10px;
            backdrop-filter: blur(2px);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #fff9f0;
            padding: 2.5rem;
            border-radius: 40px 20px 40px 20px;
            border: 8px double #ff99bb;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-content h2 {
            font-family: 'Brush Script MT', cursive;
            color: #ad6d7e;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px dotted #ffb6c1;
            padding-bottom: 0.5rem;
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.8rem;
            font-size: 2.5rem;
            color: #ad6d7e;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #ffe4ec;
            border: 2px solid #ff99bb;
            line-height: 1;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #ff99bb;
            color: white;
            transform: scale(1.1);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .grid-item {
            background: white;
            padding: 10px 10px 20px 10px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transform: rotate(var(--rot, 0deg));
            transition: transform 0.2s;
            text-align: center;
            cursor: pointer;
        }

        .grid-item:hover {
            transform: scale(1.05) rotate(var(--rot, 0deg));
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .grid-item img, .grid-item video {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border: 1px solid #d9c9b5;
            pointer-events: none;
        }
        
        .grid-item video {
            background: #f0e4d6;
        }

        .grid-item .caption {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #8f4b5c;
            font-style: italic;
        }

        /* Стили для увеличенного просмотра */
        .enlarge-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: pointer;
        }

        .enlarge-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .enlarge-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .enlarge-content img, .enlarge-content video {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 5px solid white;
        }

        .enlarge-content video {
            background: black;
        }

        .enlarge-close {
            position: absolute;
            top: -40px;
            right: -40px;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 105, 180, 0.8);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .enlarge-close:hover {
            background: #ff1493;
            transform: scale(1.1);
        }

        @media (max-width: 700px) {
            .enlarge-close {
                top: -30px;
                right: 0;
            }
        }

        .instructions {
            background: rgba(255, 240, 245, 0.9);
            border: 3px dashed #ff99bb;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 2rem auto;
            max-width: 1000px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
            font-family: Arial, sans-serif;
        }
        
        .instructions h3 {
            color: #ad6d7e;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-family: 'Brush Script MT', cursive;
        }
        
        .instructions p {
            color: #8f4b5c;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            line-height: 1.5;
        }
        
        .instructions code {
            background: #fff0f3;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            color: #d44e6c;
            font-size: 1rem;
        }
        
        .instructions .note {
            background: #ffd9e2;
            padding: 1rem;
            border-radius: 15px;
            margin-top: 1rem;
        }

        .footer-note {
            margin-top: 3rem;
            opacity: 0.8;
            font-size: 1.2rem;
            color: #9f7280;
            text-align: center;
            position: relative;
            z-index: 1;
            background: rgba(255, 240, 245, 0.7);
            padding: 0.5rem 2rem;
            border-radius: 40px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            backdrop-filter: blur(2px);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .back-button a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff69b4;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-family: Arial, sans-serif;
        }

        .back-button a:hover {
            background-color: #ff1493;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(255, 105, 180, 0.5);
        }

        .back-button a:active {
            transform: scale(0.95);
        }

        @media (max-width: 1100px) {
            .main-cards {
                gap: 3rem;
            }
            .fan-card {
                width: 450px;
            }
            .main-photo img, .main-photo video {
                width: 280px;
                height: 210px;
            }
            .fan-photo img, .fan-photo .video-preview {
                width: 80px;
                height: 60px;
            }
        }

        @media (max-width: 700px) {
            .fan-card {
                width: 100%;
                max-width: 400px;
            }
            .fan-container {
                height: 400px;
            }
            .modal-content {
                padding: 1.5rem;
            }
            .back-button a {
                padding: 8px 16px;
                font-size: 14px;
            }
            .page-title {
                font-size: 3rem;
            }
            .sub {
                font-size: 1.2rem;
                padding: 0.4rem 1.5rem;
            }
            .instructions {
                padding: 1rem;
            }
            .fan-photo img, .fan-photo .video-preview {
                width: 70px;
                height: 52px;
            }
        }
    </style>
</head>

            // Функция для увеличения фото/видео
            function enlargeMedia(url, isVideo, caption) {
                const overlay = document.getElementById('enlargeOverlay');
                const content = document.getElementById('enlargeContent');
                
                // Очищаем предыдущее содержимое
                content.innerHTML = '<span class="enlarge-close" id="enlargeClose">&times;</span>';
                
                if (isVideo) {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.autoplay = true;
                    const source = document.createElement('source');
                    source.src = url;
                    source.type = 'video/mp4';
                    video.appendChild(source);
                    content.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = caption || 'Увеличенное фото';
                    content.appendChild(img);
                }
                
                // Добавляем обработчик для закрытия
                const closeBtn = content.querySelector('#enlargeClose');
                closeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    overlay.classList.remove('active');
                });
                
                overlay.classList.add('active');
            }

            // Функция создания веера с НАСТОЯЩИМИ фотографиями и видео
            function createFanWithRealPhotos(containerId, direction) {
                const container = document.getElementById(containerId);
                if (!container) return;
                
                const mainPhoto = container.querySelector('.main-photo');
                if (!mainPhoto) return;
                
                // Получаем данные для этой карточки
                const photos = fanImagesData[containerId] || [];
                if (photos.length === 0) return;
                
                const mainRect = mainPhoto.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                
                const centerX = mainRect.left - containerRect.left + mainRect.width / 2;
                const centerY = mainRect.top - containerRect.top + mainRect.height / 2;
                
                // Параметры веера в зависимости от направления
                let baseAngle, spreadAngle, radius;
                
                if (direction === 'left') {
                    baseAngle = -30;
                    spreadAngle = 70;
                    radius = 170;
                } else {
                    baseAngle = 30;
                    spreadAngle = 70;
                    radius = 170;
                }
                
                // Создаем фото для веера
                const count = Math.min(photos.length, 8); // максимум 8 фото
                
                for (let i = 0; i < count; i++) {
                    const photo = photos[i];
                    const fanPhoto = document.createElement('div');
                    fanPhoto.className = 'fan-photo';
                    
                    if (photo.isVideo) {
                        // Для видео создаем превью с иконкой
                        const preview = document.createElement('div');
                        preview.className = 'video-preview';
                        preview.innerHTML = '▶️';
                        fanPhoto.appendChild(preview);
                    } else {
                        const img = document.createElement('img');
                        img.src = photo.url;
                        img.alt = photo.caption;
                        fanPhoto.appendChild(img);
                    }
                    
                    // Распределяем углы равномерно
                    let angle;
                    if (direction === 'left') {
                        angle = baseAngle - (spreadAngle / 2) + (i * spreadAngle / (count - 1 || 1));
                    } else {
                        angle = baseAngle - (spreadAngle / 2) + (i * spreadAngle / (count - 1 || 1));
                    }
                    
                    const photoRot = (Math.random() * 20 - 10).toFixed(1);
                    const r = radius + (Math.random() * 30 - 15);
                    
                    const x = centerX + r * Math.sin(angle * Math.PI / 180);
                    const y = centerY - r * Math.cos(angle * Math.PI / 180);
                    
                    fanPhoto.style.left = (x - 50) + 'px';
                    fanPhoto.style.top = (y - 37) + 'px';
                    
                    const randomShift = 15;
                    fanPhoto.style.left = (parseFloat(fanPhoto.style.left) + (Math.random() * randomShift - randomShift/2)) + 'px';
                    fanPhoto.style.top = (parseFloat(fanPhoto.style.top) + (Math.random() * randomShift - randomShift/2)) + 'px';
                    
                    fanPhoto.style.transform = `rotate(${photoRot}deg)`;
                    
                    // Добавляем обработчик клика на маленькое фото
                    fanPhoto.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const container = this.closest('.fan-container');
                        if (!container) return;
                        
                        const containerId = container.id;
                        let title = '';
                        
                        switch(containerId) {
                            case 'fan1': title = 'Поездка в Ефремов'; break;
                            case 'fan2': title = 'Поездка в Алексин'; break;
                            case 'fan3': title = 'Поездка в Кисловодск'; break;
                            case 'fan4': title = 'Московский зоопарк'; break;
                            case 'fan5': title = 'Наши прогулки'; break;
                            case 'fan6': title = 'Просто наши моменты'; break;
                            default: title = 'Фотографии из веера';
                        }
                        
                        openModal(containerId, title);
                    });
                    
                    container.appendChild(fanPhoto);
                }
            }
            
            // Применяем повороты
            function setMainRotations() {
                const fanCards = document.querySelectorAll('.fan-card');
                fanCards.forEach(card => {
                    const mainRot = card.dataset.mainRot || '0deg';
                    const labelRot = card.dataset.labelRot || '1deg';
                    
                    const mainPhoto = card.querySelector('.main-photo');
                    const mainLabel = card.querySelector('.main-label');
                    
                    if (mainPhoto) {
                        mainPhoto.style.setProperty('--main-rot', mainRot);
                    }
                    if (mainLabel) {
                        mainLabel.style.setProperty('--label-rot', labelRot);
                    }
                });
            }
            
            // Наблюдатель за появлением карточек
            function observeCards() {
                const cards = document.querySelectorAll('.fan-card');
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('revealed');
                        }
                    });
                }, {
                    threshold: 0.2
                });
                
                cards.forEach(card => {
                    observer.observe(card);
                });
            }

            // Открытие модального окна с поддержкой видео
            function openModal(containerId, title) {
                const modal = document.getElementById('modalOverlay');
                const grid = document.getElementById('photoGrid');
                const modalTitle = document.getElementById('modalTitle');
                
                grid.innerHTML = '';
                
                const photos = fanImagesData[containerId] || [];
                
                if (photos.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#8f4b5c;">Нет фотографий</p>';
                } else {
                    photos.forEach((photo) => {
                        const item = document.createElement('div');
                        item.className = 'grid-item';
                        const rot = (Math.random() * 6 - 3).toFixed(1);
                        item.style.setProperty('--rot', rot + 'deg');
                        
                        if (photo.isVideo) {
                            item.innerHTML = `
                                <video width="100%" height="120" controls>
                                    <source src="${photo.url}" type="video/mp4">
                                    Ваш браузер не поддерживает видео.
                                </video>
                                <div class="caption">${photo.caption}</div>
                            `;
                        } else {
                            item.innerHTML = `
                                <img src="${photo.url}" alt="${photo.caption}">
                                <div class="caption">${photo.caption}</div>
                            `;
                        }
                        
                        // Добавляем обработчик клика для увеличения
                        item.addEventListener('click', function(e) {
                            e.stopPropagation();
                            enlargeMedia(photo.url, photo.isVideo, photo.caption);
                        });
                        
                        grid.appendChild(item);
                    });
                }
                
                modalTitle.textContent = title;
                modal.classList.add('active');
            }
            
            // Создаём веера с настоящими фото после загрузки страницы
            setTimeout(() => {
                const fanCards = document.querySelectorAll('.fan-card');
                fanCards.forEach(card => {
                    const containerId = card.querySelector('.fan-container').id;
                    const direction = card.dataset.fanDirection || 'left';
                    createFanWithRealPhotos(containerId, direction);
                });
                
                // Обработчики клика на главные фото
                document.querySelectorAll('.main-photo').forEach((mainPhoto) => {
                    mainPhoto.addEventListener('click', function(e) {
                        e.stopPropagation();
                        
                        const container = this.closest('.fan-container');
                        if (!container) return;
                        
                        const containerId = container.id;
                        let title = '';
                        
                        switch(containerId) {
                            case 'fan1': title = 'Поездка в Ефремов'; break;
                            case 'fan2': title = 'Поездка в Алексин'; break;
                            case 'fan3': title = 'Поездка в Кисловодск'; break;
                            case 'fan4': title = 'Московский зоопарк'; break;
                            case 'fan5': title = 'Наши прогулки'; break;
                            case 'fan6': title = 'Просто наши моменты'; break;
                            default: title = 'Фотографии из веера';
                        }
                        
                        openModal(containerId, title);
                    });
                });
                
            }, 300);
            
            // Закрытие модального окна
            const modal = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('modalClose');
            
            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });

            // Закрытие увеличенного просмотра
            const enlargeOverlay = document.getElementById('enlargeOverlay');
            enlargeOverlay.addEventListener('click', function(e) {
                if (e.target === enlargeOverlay) {
                    enlargeOverlay.classList.remove('active');
                }
            });
            
            // Инициализация
            setMainRotations();
            observeCards();
            
            setTimeout(() => {
                const cards = document.querySelectorAll('.fan-card');
                cards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const windowHeight = window.innerHeight;
                    if (rect.top < windowHeight - 50 && rect.bottom > 0) {
                        card.classList.add('revealed');
                    }
                });
            }, 400);
        })();
    </script>
